eng:
  - I'm the king of the world!
  - I rule this world!
  - I am the world's king!
  - I am king of the world
ara:
  - أنا أحكم هذا العالم!
  - أنا ملك العالم!
  - انا ملك العالم!
deu:
  - Ich bin der König der Welt!
  - Ich regiere diese Welt!
ell:
  - Είμαι ο βασιλιάς του κόσμου!
  - Εγώ κυβερνώ αυτόν τον κόσμο!
fra:
  - Je dirige ce monde !
  - Je suis le roi du monde !
heb:
  - אני מלך העולם!
  - אני שולט בעולם הזה!
  - אני המלך של העולם הזה!
  - אני המלך של העולם!
  - אני המלך של כל העולם!
ita:
  - Io governo questo mondo!
  - Sono il re del mondo!
jpn:
  - 私は世界の王だ！
  - この世界を支配するのは私だ！
  - 私は世界の王です！
kor:
  - 나는 세계의 왕이다!
  - 나는 세상의 왕이다!
  - 나는 이 세상을 지배한다!
por:
  - Eu governo este mundo!
  - Eu sou o rei do mundo!
rus:
  - Я король мира!
  - Я управляю этим миром!
spa:
  - ¡Soy el rey del mundo!
  - ¡Yo gobierno este mundo!
